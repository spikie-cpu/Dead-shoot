<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Shoot</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui { position:fixed; top:10px; left:10px; color:white; font-family:sans-serif; }
#crosshair {
  position:fixed; top:50%; left:50%;
  width:10px; height:10px; background:white;
  transform:translate(-50%,-50%);
}
button {
  position:fixed; padding:12px;
  background:red; color:white; border:none;
}
#shoot { bottom:20px; right:20px; }
#reload { bottom:20px; right:120px; }
#start { top:10px; right:20px; }
#pause { top:60px; right:20px; }
</style>
</head>

<body>
<div id="ui">HP:100 Ammo:30 Time:60</div>
<div id="crosshair"></div>

<button id="shoot">SHOOT</button>
<button id="reload">RELOAD</button>
<button id="start">START</button>
<button id="pause">PAUSE</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000,10,50);

let camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 5;

// แสง
let light = new THREE.PointLight(0xffffff,1);
light.position.set(0,5,5);
scene.add(light);

// พื้น
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshPhongMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ===== ตัวแปรเกม =====
let hp=100, ammo=30, maxAmmo=30;
let reloadTime=0, isReloading=false;
let timeLeft=60;
let gameRunning=false;

let zombies=[];

// ===== เสียง =====
let shootSound = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bfa1c.mp3");

// ===== สร้างมอน =====
function spawnZombie(boss=false){
  let geo = new THREE.BoxGeometry(boss?2:1,boss?2:1,boss?2:1);
  let mat = new THREE.MeshPhongMaterial({color:boss?0xff0000:0x00ff00});
  let z = new THREE.Mesh(geo,mat);

  z.position.set((Math.random()-0.5)*10,1,-20);
  z.hp = boss?30:5;
  z.speed = boss?0.03:0.05;

  scene.add(z);
  zombies.push(z);
}

// ===== ยิง =====
function shoot(){
  if(!gameRunning || ammo<=0 || isReloading) return;
  ammo--;

  shootSound.currentTime=0;
  shootSound.play();

  let ray = new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(0,0),camera);
  let hit = ray.intersectObjects(zombies);

  if(hit.length>0){
    let z = hit[0].object;
    z.hp -= 2;

    if(z.hp<=0){
      scene.remove(z);
      zombies.splice(zombies.indexOf(z),1);
    }
  }
}

// ===== รีโหลด =====
function reload(){
  if(isReloading || ammo===maxAmmo) return;
  isReloading=true;
  reloadTime=0;
}

// ===== ปุ่ม =====
document.getElementById("shoot").onclick=shoot;
document.getElementById("reload").onclick=reload;
document.getElementById("start").onclick=()=>gameRunning=true;
document.getElementById("pause").onclick=()=>gameRunning=false;

// ===== เล็ง =====
let lastX=0, touching=false;
document.addEventListener("touchstart",e=>{
  touching=true; lastX=e.touches[0].clientX;
});
document.addEventListener("touchmove",e=>{
  if(!touching) return;
  let dx=e.touches[0].clientX-lastX;
  camera.rotation.y-=dx*0.005;
  lastX=e.touches[0].clientX;
});
document.addEventListener("touchend",()=>touching=false);

// ===== loop =====
setInterval(()=>{ if(gameRunning && timeLeft>0) timeLeft--; },1000);

function animate(){
requestAnimationFrame(animate);

if(gameRunning){

  // spawn
  if(Math.random()<0.02) spawnZombie();

  // บอสตอนท้าย
  if(timeLeft===10 && zombies.length<3){
    spawnZombie(true);
  }

  // เดิน
  zombies.forEach(z=>{
    z.lookAt(camera.position);
    z.position.z += z.speed;

    if(z.position.z>4){
      hp-=5;
      z.position.z=-20;
    }
  });

  // reload cooldown
  if(isReloading){
    reloadTime += 0.02;
    if(reloadTime>=1){
      ammo=maxAmmo;
      isReloading=false;
    }
  }
}

// UI
document.getElementById("ui").innerText =
"HP:"+hp+
" Ammo:"+ammo+
(isReloading?" Reloading "+Math.floor(reloadTime*100)+"%":"")+
" Time:"+timeLeft;

renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
