<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Shoot 3D</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:fixed; color:white; font-family:sans-serif;
  top:10px; left:10px;
}
#crosshair {
  position:fixed;
  top:50%; left:50%;
  width:10px; height:10px;
  background:white;
  transform:translate(-50%,-50%);
}
#shootBtn, #reloadBtn {
  position:fixed; bottom:20px;
  padding:15px;
  background:red; color:white; border:none;
}
#shootBtn { right:20px; }
#reloadBtn { right:120px; }
</style>
</head>

<body>
<div id="ui">HP: 100 | Ammo: 10</div>
<div id="crosshair"></div>
<button id="shootBtn">SHOOT</button>
<button id="reloadBtn">RELOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// scene
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// player
camera.position.z = 5;
let hp = 100;
let ammo = 10;

// zombies
let zombies = [];

function spawnZombie(){
  let geo = new THREE.BoxGeometry(1,1,1);
  let mat = new THREE.MeshBasicMaterial({color:0x00ff00});
  let z = new THREE.Mesh(geo, mat);
  z.position.set((Math.random()-0.5)*10,0,-20);
  z.hp = 3;
  scene.add(z);
  zombies.push(z);
}
setInterval(spawnZombie,2000);

// ยิง
function shoot(){
  if(ammo <= 0) return;
  ammo--;

  zombies.forEach((z,i)=>{
    if(Math.abs(z.position.x) < 1){
      z.hp--;
      if(z.hp<=0){
        scene.remove(z);
        zombies.splice(i,1);
      }
    }
  });
}

// รีโหลด
function reload(){
  ammo = 10;
}

// ปุ่ม
document.getElementById("shootBtn").onclick = shoot;
document.getElementById("reloadBtn").onclick = reload;

// เล็ง (ลากจอ)
let isTouch = false;
let lastX = 0;

document.addEventListener("touchstart", e=>{
  isTouch = true;
  lastX = e.touches[0].clientX;
});

document.addEventListener("touchmove", e=>{
  if(!isTouch) return;
  let dx = e.touches[0].clientX - lastX;
  camera.rotation.y -= dx * 0.005;
  lastX = e.touches[0].clientX;
});

document.addEventListener("touchend", ()=> isTouch=false);

// loop
function animate(){
  requestAnimationFrame(animate);

  zombies.forEach(z=>{
    z.position.z += 0.05;

    if(z.position.z > 4){
      hp -= 5;
      z.position.z = -20;
    }
  });

  document.getElementById("ui").innerText =
    "HP: " + hp + " | Ammo: " + ammo;

  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
